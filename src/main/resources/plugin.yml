name: BetterSpawns
version: 1.0.2
main: com.bettersp.bettersp.BetterSpawns
api-version: 1.21
commands:
  play:
    description: Teleports the player to a random spawn location in the main world.
    usage: /play
    permission: bettersp.play
  bsreload:
    description: Reloads the Better Spawns config
    permission: bettersp.reload